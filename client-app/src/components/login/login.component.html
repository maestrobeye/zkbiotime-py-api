
<div class="flex min-h-screen">
  <!-- Left Column: Branding & Illustration -->
  <div class="hidden lg:flex w-1/2 bg-gradient-to-br from-blue-600 to-indigo-800 text-white p-12 flex-col justify-between">
    <div>
      <div class="flex items-center space-x-3">
        <div class="bg-white/30 rounded-lg w-12 h-12 flex items-center justify-center">
            <span class="text-white font-bold text-xl tracking-tighter">ISEP</span>
        </div>
        <span class="text-3xl font-bold">Pointage</span>
      </div>
      <h1 class="text-4xl font-bold mt-12 leading-tight">Gérez le temps de votre équipe avec précision.</h1>
      <p class="text-lg mt-4 text-blue-100">Connectez-vous pour accéder à votre tableau de bord.</p>
    </div>
    <div class="text-sm text-blue-200">
      &copy; 2024 ISEP Pointage. Tous droits réservés.
    </div>
  </div>

  <!-- Right Column: Login Form -->
  <div class="w-full lg:w-1/2 flex items-center justify-center bg-gray-100 p-8">
    <div class="w-full max-w-md">
      <div class="text-center lg:hidden mb-8">
         <div class="flex items-center justify-center space-x-3 mb-4">
          <div class="bg-blue-600 rounded-lg w-12 h-12 flex items-center justify-center">
              <span class="text-white font-bold text-xl tracking-tighter">ISEP</span>
          </div>
          <span class="text-3xl font-bold text-gray-800">Pointage</span>
        </div>
      </div>
      
      <div class="bg-white rounded-xl shadow-2xl p-8 sm:p-10">
        <h2 class="text-2xl font-bold text-gray-800 text-center">Connexion</h2>
        <p class="mt-2 text-sm text-gray-500 text-center">
          Utilisez <span class="font-mono text-xs bg-gray-200 p-1 rounded">admin@pointage.pro</span> / <span class="font-mono text-xs bg-gray-200 p-1 rounded">password</span>
        </p>

        <form class="mt-8 space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
          
          <div>
            <label for="email-address" class="text-sm font-medium text-gray-700">Adresse e-mail</label>
            <div class="mt-1 relative">
              <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z" />
                  <path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z" />
                </svg>
              </div>
              <input id="email-address" name="email" type="email" formControlName="email" required
                     class="appearance-none block w-full px-3 py-3 pl-10 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                     placeholder="vous@example.com">
            </div>
          </div>

          <div>
            <label for="password" class="text-sm font-medium text-gray-700">Mot de passe</label>
            <div class="mt-1 relative">
               <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor">
                  <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd" />
                </svg>
              </div>
              <input id="password" name="password" [type]="passwordVisible() ? 'text' : 'password'" formControlName="password" required
                     class="appearance-none block w-full px-3 py-3 pl-10 border border-gray-300 rounded-md shadow-sm placeholder-gray-400 focus:outline-none focus:ring-blue-500 focus:border-blue-500 sm:text-sm"
                     placeholder="Votre mot de passe">
              <button type="button" (click)="togglePasswordVisibility()" class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-500 hover:text-gray-700">
                @if (passwordVisible()) {
                  <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 001.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.45 10.45 0 0112 4.5c4.756 0 8.773 3.162 10.065 7.498a10.523 10.523 0 01-4.293 5.774M6.228 6.228L3 3m3.228 3.228l3.65 3.65m7.894 7.894L21 21m-3.228-3.228l-3.65-3.65m0 0a3 3 0 10-4.243-4.243m4.242 4.242L6.228 6.228" />
                  </svg>
                } @else {
                  <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.432 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  </svg>
                }
              </button>
            </div>
          </div>
          
          @if (errorMessage()) {
            <div class="bg-red-50 border-l-4 border-red-400 text-red-700 p-4" role="alert">
              <div class="flex">
                <div class="py-1"><svg class="fill-current h-6 w-6 text-red-500 mr-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20"><path d="M2.93 17.07A10 10 0 1 1 17.07 2.93 10 10 0 0 1 2.93 17.07zM9 5v6h2V5H9zm0 8v2h2v-2H9z"/></svg></div>
                <div>
                  <p class="font-bold">Erreur de connexion</p>
                  <p class="text-sm">{{ errorMessage() }}</p>
                </div>
              </div>
            </div>
          }

          <div>
            <button type="submit" [disabled]="isLoading()"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:bg-blue-400 transition-colors duration-300">
              @if (isLoading()) {
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Connexion en cours...
              } @else {
                Se connecter
              }
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
