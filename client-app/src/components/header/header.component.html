
<header class="bg-white text-gray-700 shadow-sm border-b border-gray-200">
  <div class="container mx-auto px-6">
    <div class="flex items-center justify-between h-20">
      
      <!-- Left Section: Logo & Navigation -->
      <div class="flex items-center space-x-8">
        <!-- Logo -->
        <a routerLink="/dashboard" class="flex items-center space-x-3 flex-shrink-0">
          <div class="bg-blue-600 rounded-lg w-11 h-11 flex items-center justify-center">
              <span class="text-white font-bold text-lg tracking-tighter">ISEP</span>
          </div>
          <span class="text-2xl font-bold text-gray-800">Pointage</span>
        </a>
        
        <!-- Desktop Navigation -->
        <nav class="hidden md:flex items-center space-x-2">
          <a routerLink="/dashboard" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
            Tableau de bord
          </a>
          <a routerLink="/personnel" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21a6 6 0 00-9-5.197m0 0A5.995 5.995 0 0112 12.75a5.995 5.995 0 01-3 5.053z" /></svg>
            Personnel
          </a>
           <a routerLink="/historique" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            Historique
          </a>
          <a routerLink="/statistics" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-4 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
            Statistiques
          </a>
        </nav>
      </div>

      <!-- Right Section: Info & User -->
      <div class="hidden md:flex items-center space-x-5">
        <span class="text-sm text-gray-500 whitespace-nowrap">{{ currentDate() }}</span>
        
        <div class="bg-green-100 text-green-800 text-sm font-semibold px-3 py-1.5 rounded-full flex items-center">
            <span class="h-2 w-2 bg-green-500 rounded-full mr-2"></span>
            En ligne
        </div>
        
        <div class="h-6 w-px bg-gray-200"></div>
        
        <!-- <button class="relative text-gray-500 hover:text-gray-700">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002_0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
          <span class="absolute top-0.5 right-0.5 h-2 w-2 bg-red-500 rounded-full border border-white"></span>
        </button> -->

        <!-- Profile Dropdown -->
        <div class="relative">
          <div>
            <button (click)="toggleProfileMenu(); $event.stopPropagation()" type="button" class="max-w-xs bg-gray-200 rounded-full flex items-center justify-center text-sm focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 h-10 w-10" id="user-menu-button" aria-expanded="false" aria-haspopup="true">
              <span class="sr-only">Open user menu</span>
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </button>
          </div>

          @if (isProfileMenuOpen()) {
            <div (click)="$event.stopPropagation()"
                class="origin-top-right absolute right-0 mt-2 w-56 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-10"
                role="menu" aria-orientation="vertical" aria-labelledby="user-menu-button" tabindex="-1">
              <div class="py-1" role="none">
                <div class="px-4 py-3">
                    <p class="text-sm font-semibold text-gray-800" role="none">{{currentUser.name}}</p>
                    <p class="text-sm text-gray-500 truncate" role="none">{{currentUser.email}}</p>
                </div>
              </div>
              <div class="border-t border-gray-100 py-1" role="none">
                <button (click)="logout()" class="w-full text-left flex items-center text-gray-700 px-4 py-2 text-sm hover:bg-gray-100" role="menuitem" tabindex="-1" id="user-menu-item-2">
                   <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                      <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                  </svg>
                  Déconnexion
                </button>
              </div>
            </div>
          }
        </div>
      </div>

      <!-- Mobile Menu Button -->
      <div class="md:hidden">
        <button (click)="toggleMobileMenu()" type="button" class="text-gray-500 hover:text-gray-700 focus:outline-none">
          <svg class="h-6 w-6 fill-current" viewBox="0 0 24 24">
             @if (!isMobileMenuOpen()) {
              <path fill-rule="evenodd" d="M4 5h16a1 1 0 0 1 0 2H4a1 1 0 1 1 0-2zm0 6h16a1 1 0 0 1 0 2H4a1 1 0 0 1 0-2zm0 6h16a1 1 0 0 1 0 2H4a1 1 0 0 1 0-2z"/>
            } @else {
              <path fill-rule="evenodd" d="M18.278 16.864a1 1 0 0 1-1.414 1.414l-4.829-4.828-4.828 4.828a1 1 0 0 1-1.414-1.414l4.828-4.829-4.828-4.828a1 1 0 0 1 1.414-1.414l4.829 4.828 4.828-4.828a1 1 0 1 1 1.414 1.414l-4.828 4.829 4.828 4.828z"/>
            }
          </svg>
        </button>
      </div>

    </div>
    
    <!-- Mobile Navigation -->
    @if (isMobileMenuOpen()) {
      <div class="md:hidden py-4 border-t border-gray-200">
        <!-- User info for mobile -->
        <div class="px-3 pb-3 mb-3 border-b border-gray-200">
          <div class="flex items-center">
            <div class="h-10 w-10 rounded-full bg-gray-200 flex items-center justify-center">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z" />
              </svg>
            </div>
            <div class="ml-3">
              <p class="text-sm font-medium text-gray-800">{{currentUser.name}}</p>
              <p class="text-xs text-gray-500">{{currentUser.email}}</p>
            </div>
          </div>
        </div>

        <nav class="flex flex-col space-y-1 px-2">
          <a routerLink="/dashboard" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z" /></svg>
            Tableau de bord
          </a>
          <a routerLink="/personnel" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
             <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M15 21a6 6 0 00-9-5.197m0 0A5.995 5.995 0 0112 12.75a5.995 5.995 0 01-3 5.053z" /></svg>
            Personnel
          </a>
           <a routerLink="/historique" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
            Historique
          </a>
          <a routerLink="/statistics" routerLinkActive="text-blue-600 bg-blue-50 font-semibold" class="flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" /></svg>
            Statistiques
          </a>
        </nav>
        <div class="mt-4 pt-4 border-t border-gray-200 px-2">
             <button (click)="logout()" class="w-full flex items-center px-3 py-2 rounded-lg text-gray-600 hover:bg-gray-100 transition-colors duration-200">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1" />
                </svg>
                Déconnexion
            </button>
        </div>
      </div>
    }
  </div>
</header>
